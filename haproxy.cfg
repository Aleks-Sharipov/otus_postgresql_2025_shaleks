global
    log 127.0.0.1 local2
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 300

defaults
    log global
    mode tcp
    retries 2
    mode http
    option http-server-close
    timeout client 50s
    timeout server 50s
    timeout connect 8s
    timeout check 5s

listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /

frontend patroni_frontend
    bind *:5433
    default_backend patroni_backend
    mode tcp

backend patroni_backend
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    mode tcp

    server sys-atl-db01 sys-atl-db01:5432 maxconn 100 check port 8008
    server sys-atl-db02 sys-atl-db02:5432 maxconn 100 check port 8008
    server sys-atl-db03 sys-atl-db03:5432 maxconn 100 check port 8008
